kind: "AppStack"
apiVersion: "v1"

# Configuración de ejecución para el contenedor de Next.js
runConfig:
  region: "us-central1"
  cpu: 1
  memoryMiB: 512

# Declaración de variables de entorno. 
# Para que el archivo sea válido, cada variable debe apuntar a un secreto o tener un valor fijo.
env:
  - variable: GENAI_API_KEY
    secret: GENAI_API_KEY
  - variable: ADMIN_SERVICE_ACCOUNT
    secret: ADMIN_SERVICE_ACCOUNT
  - variable: APP_BASE_URL
    value: "https://pcgoperacion.com"
